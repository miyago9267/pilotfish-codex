# Pilotfish orchestration with Remora-aligned Codex routing.
# Merge these keys and tables into ~/.codex/config.toml.
model = "gpt-5.6-sol"

[features]
multi_agent = true

[agents]
# One orchestrator plus up to three leaf workers keeps fan-out bounded.
max_threads = 3
# Root may spawn leaves; leaves may not spawn another generation.
max_depth = 1
