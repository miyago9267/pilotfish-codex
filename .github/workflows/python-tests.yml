name: Python tests

on:
  pull_request:
    paths:
      - "install/**"
      - "templates/**"
      - "tests/**"
      - "docs/specs/dispatch-verification/**"
      - ".github/workflows/python-tests.yml"
  push:
    branches:
      - main
    paths:
      - "install/**"
      - "templates/**"
      - "tests/**"
      - "docs/specs/dispatch-verification/**"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check Python syntax
        run: python -m py_compile install/install.py install/validate_agents.py install/verify_dispatch.py install/evaluate_dispatch.py

      - name: Check shell syntax
        run: bash -n install/install.sh

      - name: Validate packaged configuration
        run: python install/validate_agents.py
