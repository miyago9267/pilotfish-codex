name: Markdown lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdownlint.yml"
      - ".markdownlint-cli2.jsonc"
      - "bun.lock"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/markdownlint.yml"
      - ".markdownlint-cli2.jsonc"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint Markdown
        run: bun run lint:md
